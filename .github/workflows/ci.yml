name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: swift test
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build
        run: swift build

      - name: Test
        run: swift test
